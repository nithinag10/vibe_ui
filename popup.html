<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1a1a1a;
      padding: 0;
    }

    .top {
      background: #111;
      padding: 20px 20px 18px;
      color: #fff;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 4px;
    }

    .star { font-size: 20px; }
    .brand { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; }
    .tagline { font-size: 12px; color: #888; }

    .body { padding: 20px; }

    .field-label {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: block;
      margin-bottom: 8px;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ebebeb;
      border-radius: 12px;
      font-size: 13px;
      font-family: monospace;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }

    input:focus {
      border-color: #111;
      background: #fff;
    }

    .show-toggle {
      font-size: 11px;
      color: #aaa;
      cursor: pointer;
      text-align: right;
      margin-top: 5px;
      user-select: none;
    }

    .show-toggle:hover { color: #555; }

    button.save {
      width: 100%;
      margin-top: 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s;
    }

    button.save:hover { background: #333; }

    .status {
      font-size: 12px;
      min-height: 16px;
      margin-top: 10px;
      text-align: center;
    }

    .divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 18px 0;
    }

    .how {
      font-size: 12px;
      color: #aaa;
      line-height: 1.6;
    }

    .how strong { color: #888; font-weight: 600; }

    .get-key {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 11px;
      color: #bbb;
      text-decoration: none;
    }

    .get-key:hover { color: #888; }
  </style>
</head>
<body>
  <div class="top">
    <div class="logo-row">
      <span class="star">✦</span>
      <span class="brand">Vibe</span>
    </div>
    <div class="tagline">AI page customizer — powered by Claude</div>
  </div>

  <div class="body">
    <label class="field-label" for="api-key">Anthropic API Key</label>
    <input type="password" id="api-key" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false">
    <div class="show-toggle" id="toggle-show">Show key</div>

    <button class="save" id="save-btn">Save key</button>
    <div class="status" id="status"></div>

    <hr class="divider">

    <div class="how">
      Visit any page and click the <strong>✦ Vibe</strong> button (bottom-right) to customize it with natural language.<br><br>
      Changes <strong>persist per URL</strong> — every visit loads your vibed version.
    </div>

    <a class="get-key" href="https://console.anthropic.com/settings/keys" target="_blank">
      Get a free API key →
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
